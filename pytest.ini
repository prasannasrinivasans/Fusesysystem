[pytest]
testpaths = tests
addopts = 
    -v 
    -s 
    --html=reports/report.html 
    --self-contained-html
    --tb=short
    --strict-markers
    --disable-warnings
log_cli = false
log_cli_level = INFO
log_cli_format = [%(asctime)s] %(levelname)s: %(message)s
log_file = reports/pytest.log
log_file_level = DEBUG
markers =
    smoke: Smoke tests
    regression: Regression tests
    member_list: Member list feature tests
